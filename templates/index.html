<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的專屬美食指南</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; font-size: 1em; }
        .btn-blue { background: #2196F3; }
        .btn-green { background: #4CAF50; }
        .btn-purple { background: #9C27B0; }
        .btn-red { background: #f44336; }
        input, select, textarea { padding: 10px; margin: 5px 0 15px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .store-item { border-bottom: 1px dashed #ccc; padding: 15px 0; }
        .tag { background: #eee; padding: 3px 8px; border-radius: 12px; font-size: 0.8em; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #333;">🍽️ 我的專屬美食指南</h1>

        <div class="card" style="border-top: 5px solid #FF9800;">
            <h2>📊 吃貨戰力儀表板</h2>
            <div id="dashboard-stats" style="font-size: 1.2em; margin-bottom: 15px; line-height: 1.6;"></div>
            <div style="max-width: 350px; margin: auto;">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <div class="card" style="border-top: 5px solid #2196F3;">
            <h2>🗺️ 美食足跡地圖</h2>
            <div id="foodMap" style="height: 400px; width: 100%; border-radius: 8px; z-index: 1;"></div>
        </div>

        <div class="card" style="border-top: 5px solid #9C27B0;">
            <h2>✨ 魔法新增與自動情報</h2>
            <textarea id="aiInput" rows="3" placeholder="請貼上含有「店名」與「地址」的雜亂分享文字..."></textarea>
            <button class="btn btn-purple" onclick="useAiToAddStore()">✨ 呼叫 AI 幫我儲存</button>
            <div id="aiResult" style="margin-top: 10px; font-weight: bold; color: #9C27B0;"></div>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #ccc;">
            
            <div style="background-color: #ffebee; padding: 15px; border-radius: 5px; border-left: 5px solid #f44336;">
                <h3 style="margin-top: 0; color: #d32f2f;">🕷️ 自動情報收集管線</h3>
                <p style="margin: 5px 0;">不知道要吃什麼？讓系統自動去 PTT 美食版幫你抓最新的熱門餐廳回來！</p>
                <button class="btn btn-red" onclick="startAutoCrawl()">🚀 一鍵自動尋找新美食</button>
                <div id="crawlResult" style="margin-top: 10px; font-weight: bold; color: #d32f2f;"></div>
            </div>
        <div class="card">
            <h2>📝 已儲存的餐廳清單</h2>
            <p style="font-size: 0.9em; color: #666;">從你儲存的美食庫中快速選擇：</p>
            
            <select id="savedStoresDropdown" onchange="handleStoreSelection()">
                <option value="">🔄 載入中...</option>
            </select>
            
            <div id="selectedStoreInfo" style="margin-top: 10px; color: #E64A19; font-weight: bold;"></div>
        </div>
        </div>
        <div class="card" style="border-top: 5px solid #FF5722;">
            <h2>📍 免費附近美食雷達 (3km)</h2>
            <p style="font-size: 0.9em; color: #666;">利用 OpenStreetMap 尋找你附近的餐廳，並可一鍵加入清單！</p>
            <button class="btn btn-red" onclick="searchNearbyOSM()" style="width: 100%;">Radar 開啟：搜尋附近美食</button>
            
            <div id="recommendList" style="margin-top: 15px;"></div>
        </div>

<div id="recommendList"></div>


        <div class="card" style="border-top: 5px solid #4CAF50;">
            <h2>🔍 綜合進階搜尋</h2>
            <input type="text" id="searchKeyword" placeholder="輸入想吃的種類或店名 (如: 咖啡、拉麵、中山站...)">
            
            <div style="display: flex; gap: 10px;">
                <select id="searchRadius" style="flex: 1;">
                    <option value="unlimited">不限距離</option>
                    <option value="1">1 公里內</option>
                    <option value="3" selected>3 公里內</option>
                    <option value="5">5 公里內</option>
                </select>
                <select id="searchEaten" style="flex: 1;">
                    <option value="all">吃過/沒吃過都要</option>
                    <option value="0">只看「還沒吃過」</option>
                    <option value="1">只看「已經吃過」</option>
                </select>
            </div>
            
            <button class="btn btn-green" onclick="performAdvancedSearch()" style="width: 100%;">開始搜尋</button>
            <div id="searchResults" style="margin-top: 20px;"></div>
        </div>
    </div>
    <script>
        
</script>

    <script>
        let map = null;
        let markerGroup = null;
        let currentChart = null;
        let userLat = null;
        let userLon = null;

        // 取得使用者目前位置
        function getUserLocation(callback) {
            if (userLat && userLon) {
                callback();
                return;
            }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    callback();
                },
                err => {
                    console.warn("無法取得定位，部分距離功能將受限。");
                    callback(); // 就算沒定位也繼續執行
                }
            );
        }

        // --- 📊 載入儀表板 ---
        async function loadDashboard() {
            getUserLocation(async () => {
                const res = await fetch("/dashboard_data", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ latitude: userLat, longitude: userLon })
                });
                const data = await res.json();
                
                document.getElementById("dashboard-stats").innerHTML = `
                    🍽️ 目前收錄：<b>${data.total}</b> 家餐廳<br>
                    ✅ 已經征服：<b>${data.eaten}</b> 家<br>
                    🏃 總移動距離：<b>${data.distance}</b> 公里<br>
                    👑 目前稱號：<span style="color: #f44336; font-weight: bold;">${data.level}</span>
                `;

                const labels = Object.keys(data.categories);
                const values = Object.values(data.categories);

                if (currentChart) currentChart.destroy();
                const ctx = document.getElementById("categoryChart").getContext("2d");
                currentChart = new Chart(ctx, {
                    type: "pie",
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: ["#FF6384", "#36A2EB", "#FFCE56", "#4BC0C0", "#9966FF", "#FF9F40", "#E7E9ED"]
                        }]
                    }
                });
            });
        }

        // --- 🗺️ 載入地圖 ---
        async function initFoodMap() {
            if (!map) {
                map = L.map('foodMap').setView([23.6978, 120.9605], 7);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                markerGroup = L.layerGroup().addTo(map);
            }

            const res = await fetch("/stores");
            const stores = await res.json();
            markerGroup.clearLayers();
            let bounds = [];

            stores.forEach(store => {
                if (store.latitude && store.longitude) {
                    const prefix = store.is_favorite ? "❤️ " : "🍽️ ";
                    const marker = L.marker([store.latitude, store.longitude]).bindPopup(`
                        <strong>${prefix}${store.name}</strong><br>
                        📍 ${store.address}<br>
                        <a href="${store.google_maps_url}" target="_blank">在地圖上開啟</a>
                    `);
                    markerGroup.addLayer(marker);
                    bounds.push([store.latitude, store.longitude]);
                }
            });

            if (bounds.length > 0) map.fitBounds(bounds, { padding: [30, 30] });
        }

        // --- 🔍 綜合搜尋 ---
        function performAdvancedSearch() {
            getUserLocation(async () => {
                document.getElementById("searchResults").innerHTML = "搜尋中...";
                const keyword = document.getElementById("searchKeyword").value;
                const radius = document.getElementById("searchRadius").value;
                const isEaten = document.getElementById("searchEaten").value;

                const res = await fetch("/advanced_search", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        keyword: keyword, latitude: userLat, longitude: userLon,
                        radius: radius, is_eaten: isEaten, sort_by: "distance"
                    })
                });
                const stores = await res.json();
                
                let html = "";
                if (stores.length === 0) {
                    html = "<p style='color: red;'>沒有找到符合條件的餐廳喔！</p>";
                } else {
                    stores.forEach(s => {
                        const distText = (s.distance_km === null || s.distance_km === undefined)? "未知": s.distance_km.toFixed(2) + " 公里";

                        const favPrefix = s.is_favorite ? "❤️" : "";
                        html += `
                            <div class="store-item">
                                <h3 style="margin-top: 0;">${favPrefix} ${s.name} <span class="tag">${s.category}</span></h3>
                                <p style="margin: 5px 0;">📍 ${s.address}</p>
                                <p style="margin: 5px 0; color: #2196F3;">📏 距離: ${distText} | 🔗 <a href="${s.google_maps_url}" target="_blank">Google Maps 導航</a></p>
                                <div style="margin-top: 10px;">
                                    <button class="btn btn-blue" style="padding: 5px 10px; font-size: 0.9em;" onclick="toggleStatus(${s.id}, 'is_eaten', ${s.is_eaten ? 0 : 1})">
                                        ${s.is_eaten ? "❌ 標記為沒吃過" : "✅ 標記為吃過了"}
                                    </button>
                                    <button class="btn btn-red" style="padding: 5px 10px; font-size: 0.9em; margin-left: 5px;" onclick="toggleStatus(${s.id}, 'is_favorite', ${s.is_favorite ? 0 : 1})">
                                        ${s.is_favorite ? "💔 取消最愛" : "❤️ 加入最愛"}
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById("searchResults").innerHTML = html;
            });
        }

        // --- 🔄 切換狀態 ---
        async function toggleStatus(id, field, value) {
            await fetch(`/update_status/${id}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ field: field, value: value })
            });
            performAdvancedSearch();
            loadDashboard();
            initFoodMap();
        }

        // --- ✨ AI 魔法新增 ---
        async function useAiToAddStore() {
            const text = document.getElementById("aiInput").value;
            const resDiv = document.getElementById("aiResult");
            resDiv.innerText = "🤖 AI 正在施展魔法中...";
            
            const res = await fetch("/ai_add", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ text: text })
            });
            const data = await res.json();
            resDiv.innerText = data.message || data.error;
            
            if(res.ok) {
                document.getElementById("aiInput").value = ""; // 清空輸入框
                performAdvancedSearch();
                loadDashboard();
                initFoodMap();
            }
        }
        
        // 1. 去後端抓資料，並把選項塞進下拉選單
        async function loadStoresIntoDropdown() {
            try {
                const res = await fetch("/stores");
                const stores = await res.json();
                const dropdown = document.getElementById("savedStoresDropdown");

                // 如果資料庫是空的
                if (stores.length === 0) {
                    dropdown.innerHTML = '<option value="">你還沒儲存任何餐廳喔！</option>';
                    return;
                }

                // 清空預設選項，準備放入資料
                dropdown.innerHTML = '<option value="">✨ 請選擇一間你想查看的餐廳...</option>';
                
                stores.forEach(store => {
                    const option = document.createElement("option");
                    // 把整個 store 的資料轉成字串藏在 value 裡面，方便等一下拿出來用
                    option.value = JSON.stringify(store); 
                    option.textContent = `${store.name} (${store.category || "未分類"})`;
                    dropdown.appendChild(option);
                });
            } catch (err) {
                console.error("載入選單失敗", err);
            }
        }

        // 2. 當使用者選擇某家餐廳時，觸發這個動作
        function handleStoreSelection() {
            const dropdown = document.getElementById("savedStoresDropdown");
            const selectedValue = dropdown.value;
            const infoDiv = document.getElementById("selectedStoreInfo");

            if (!selectedValue) {
                infoDiv.innerHTML = "";
                return;
            }

            // 把剛才藏在 value 裡面的資料解開
            const store = JSON.parse(selectedValue);
            
            // 你可以決定選了之後要幹嘛，例如顯示地址跟導航按鈕
            infoDiv.innerHTML = `
                你選了：${store.name} <br>
                📍 ${store.address} <br>
                <a href="${store.google_maps_url}" target="_blank" style="color: #2196F3;">在地圖上開啟導航</a>
            `;
        }
        // --- 📍 搜尋附近美食 (呼叫 OSM API) ---
        function searchNearbyOSM() {
            const listDiv = document.getElementById("recommendList");
            listDiv.innerHTML = "<b>📍 正在獲取你的位置，並向地圖發送請求中，請稍候...</b>";

            getUserLocation(async () => {
                if (!userLat || !userLon) {
                    listDiv.innerHTML = "<span style='color:red;'>❌ 無法取得你的位置，請確認瀏覽器有允許定位權限！</span>";
                    return;
                }

                try {
                    const res = await fetch("/search_nearby_osm", {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({ latitude: userLat, longitude: userLon, radius_km: 3 })
                    });
                    const stores = await res.json();

                    if (stores.length === 0) {
                        listDiv.innerHTML = "😢 附近 3 公里內沒有找到符合的地點。";
                        return;
                    }

                    let html = "<h3 style='border-bottom: 2px solid #FF5722; padding-bottom: 5px;'>🎯 附近推薦結果：</h3>";
                    stores.forEach(store => {
                        // 關鍵：將整包資料轉成安全字串，讓按鈕可以傳遞
                        const safeStoreData = encodeURIComponent(JSON.stringify(store));
                        html += `
                            <div style="border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: #fafafa;">
                                <h4 style="margin: 0 0 8px 0; font-size: 1.1em;">🍽️ ${store.name} <span class="tag">${store.category}</span></h4>
                                <p style="margin: 5px 0; color: #2196F3; font-size: 0.9em;">
                                    📏 距離: ${store.distance_km} 公里 | 🔗 <a href="${store.google_maps_url}" target="_blank">Google Maps</a>
                                </p>
                                <button onclick="saveSearchedStore('${safeStoreData}')" class="btn btn-green" style="margin-top: 5px; padding: 8px 12px;">
                                    ➕ 加入我的美食清單
                                </button>
                            </div>
                        `;
                    });
                    listDiv.innerHTML = html;

                } catch (err) {
                    listDiv.innerHTML = "<span style='color:red;'>❌ 搜尋發生錯誤，請檢查後端是否正常運作。</span>";
                    console.error(err);
                }
            });
        }

        // --- ➕ 將搜尋到的餐廳直接存入資料庫 ---
        async function saveSearchedStore(encodedData) {
            const store = JSON.parse(decodeURIComponent(encodedData));
            
            try {
                const response = await fetch("/add_custom_store", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    // 為了避免 OSM 抓不到地址，如果沒有地址，就暫時用座標代替
                    body: JSON.stringify({
                        name: store.name,
                        address: store.address || `${store.latitude || '未知'},${store.longitude || '未知'}`, 
                        category: store.category,
                        latitude: store.latitude || store.lat,
                        longitude: store.longitude || store.lon,
                        google_maps_url: store.google_maps_url
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert(result.message);
                    // 儲存成功後，自動刷新畫面上的資料
                    performAdvancedSearch();
                    loadDashboard();
                    loadStoresIntoDropdown();
                    initFoodMap();
                } else {
                    alert("❌ 儲存失敗：" + result.error);
                }
            } catch (error) {
                console.error("連線錯誤:", error);
                alert("網路連線失敗！");
            }
        }
        // --- 🚀 網頁載入時自動啟動 ---
        // 使用 DOMContentLoaded，確保網頁一準備好就獨立執行，不會被別人卡住
        document.addEventListener("DOMContentLoaded", () => {
            // 使用 try-catch 包起來，就算其中一個壞掉，也不會影響其他功能
            try { loadStoresIntoDropdown(); } catch(e) { console.error(e); }
            try { loadDashboard(); } catch(e) { console.error(e); }
            try { initMap(); } catch(e) { console.error(e); }
            
            // 如果你有預設執行搜尋，也可以加這行
            try { performAdvancedSearch(); } catch(e) { console.error(e); }
        });
    </script>
</body>
</html>
