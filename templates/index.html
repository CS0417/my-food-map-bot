<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的專屬美食指南</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --primary: #FF7043; --bg: #fdfaf7; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-blue { background: #2196F3; color: white; }
        .btn-red { background: #f44336; color: white; }
        .btn-green { background: #4CAF50; color: white; }
        .btn-purple { background: #9C27B0; color: white; }
        .store-item { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #eee; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 我的美食指南</h1>

        <div class="card">
            <h2>📊 吃貨戰力</h2>
            <div id="dashboard-stats">載入中...</div>
            <canvas id="categoryChart"></canvas>
        </div>

        <div class="card">
            <h2>🗺️ 美食地圖</h2>
            <div id="foodMap" style="height: 300px;"></div>
        </div>

        <div class="card">
            <h2>✨ AI 魔法新增</h2>
            <textarea id="aiInput" rows="3" placeholder="店名、地址、心得..."></textarea>
            <button class="btn btn-purple" onclick="useAiToAddStore()">✨ 儲存餐廳</button>
            <div id="aiResult"></div>
        </div>

        <div class="card">
            <h2>🔍 搜尋店家</h2>
            <input type="text" id="searchKeyword" placeholder="關鍵字...">
            <button class="btn btn-green" onclick="performAdvancedSearch()">搜尋</button>
            <div id="searchResults" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script>
        let map, markerGroup;

        // 1. 初始化地圖
        function initMap() {
            map = L.map('foodMap').setView([25.0864, 121.4646], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markerGroup = L.layerGroup().addTo(map);
            fetchStores();
        }

        async function fetchStores() {
            const res = await fetch("/stores");
            const stores = await res.json();
            markerGroup.clearLayers();
            stores.forEach(s => {
                if(s.latitude) L.marker([s.latitude, s.longitude]).addTo(markerGroup).bindPopup(s.name);
            });
        }

        // 2. AI 新增功能
        async function useAiToAddStore() {
            const text = document.getElementById("aiInput").value;
            const res = await fetch("/ai_add", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ text: text })
            });
            const data = await res.json();
            alert(data.message || data.error);
            location.reload();
        }

        // 3. 搜尋功能
        async function performAdvancedSearch() {
            const keyword = document.getElementById("searchKeyword").value;
            const res = await fetch("/advanced_search", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ keyword: keyword, is_eaten: "all" })
            });
            const stores = await res.json();
            let html = stores.map(s => `
                <div class="store-item">
                    <h3>${s.name}</h3>
                    <p>${s.address}</p>
                    <a href="${s.google_maps_url}" target="_blank">導航</a>
                </div>
            `).join('');
            document.getElementById("searchResults").innerHTML = html || "找不到店家";
        }

        // 4. 載入儀表板
        async function loadDashboard() {
            const res = await fetch("/dashboard_data", { method: "POST" });
            const data = await res.json();
            document.getElementById("dashboard-stats").innerHTML = `總數：${data.total} | 吃過：${data.eaten}`;
        }

        window.onload = () => { initMap(); loadDashboard(); };
    </script>
</body>
</html>
